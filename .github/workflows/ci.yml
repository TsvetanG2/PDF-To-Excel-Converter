name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Lint & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Flask app and its requirements live in this subfolder
        working-directory: ConverterApp
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Fail the build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings (won't fail the build)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Syntax check
        run: |
          # Verify the main app file compiles without executing it
          # (importing would start the Flask server and hang the job).
          python -m py_compile pdftoexcel.py
          echo "pdftoexcel.py compiled OK"
